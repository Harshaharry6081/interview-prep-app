version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: interview-agent-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: interview-agent-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interview-agent-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/interview-agent
      - CHROMA_HOST=http://chromadb:8000
      - JWT_SECRET=interview-agent-super-secret-jwt-key-2024-hackathon
    depends_on:
      - mongodb
      - chromadb
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interview-agent-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
  chroma-data:

