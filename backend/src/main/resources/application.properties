spring.application.name=interview-agent-backend
server.port=8080

# MongoDB Configuration
# Managed entirely by Kubernetes environment variables

# ChromaDB
chroma.host=${CHROMA_HOST:http://localhost:8000}

# JWT
jwt.secret=${JWT_SECRET:interview-agent-super-secret-jwt-key-2024-hackathon}

# File Upload – support large PDFs
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB

# Logging
logging.level.com.interviewagent=DEBUG

