# ============================================================
# Replace aiagenthackathon-496105 with your actual GCP project ID
# e.g. us-central1-docker.pkg.dev/my-gcp-project/interview-agent/backend:latest
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: interview-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: us-central1-docker.pkg.dev/aiagenthackathon-496105/interview-agent/backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATA_MONGODB_URI
              value: "mongodb://mongodb-service:27017/interview-agent"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
            - name: CHROMA_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: chroma-host
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: gemini-api-key
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: interview-agent
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
