apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: interview-agent-ingress
  namespace: interview-agent
  annotations:
    kubernetes.io/ingress.class: "gce"
    networking.gke.io/managed-certificates: "interview-agent-cert"
    networking.gke.io/v1beta1.FrontendConfig: "https-redirect"
    # kubernetes.io/ingress.global-static-ip-name: "interview-agent-ip"
spec:
  rules:
    - http:
        paths:
          # Backend API — matched first
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          # Frontend — catch-all
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
