apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chromadb
  namespace: interview-agent
spec:
  serviceName: chromadb-service
  replicas: 1
  selector:
    matchLabels:
      app: chromadb
  template:
    metadata:
      labels:
        app: chromadb
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:latest
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: chroma-storage
              mountPath: /chroma/chroma
  volumeClaimTemplates:
    - metadata:
        name: chroma-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard-rwo
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: chromadb-service
  namespace: interview-agent
spec:
  selector:
    app: chromadb
  ports:
    - port: 8000
      targetPort: 8000
  clusterIP: None
