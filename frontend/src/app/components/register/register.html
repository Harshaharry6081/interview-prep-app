<div class="auth-container">
  <div class="auth-bg-glow"></div>
  <div class="auth-card glass-panel">
    <div class="auth-logo">🎯</div>
    <h1>Get Started</h1>
    <p class="auth-subtitle">Create your free Interview Agent account</p>

    <form (ngSubmit)="onRegister()" #registerForm="ngForm" class="auth-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" [(ngModel)]="username" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" [(ngModel)]="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="password" placeholder="••••••••" required>
      </div>
      <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>
      <button class="btn-primary btn-full" type="submit" [disabled]="loading">
        {{ loading ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>

    <p class="auth-switch">Already have an account? <a routerLink="/login">Sign In</a></p>
  </div>
</div>
