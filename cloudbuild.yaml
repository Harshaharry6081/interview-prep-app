steps:
  # ── 1. Build Backend Image ────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/interview-agent/backend:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/interview-agent/backend:latest
      - ./backend
    id: build-backend

  # ── 2. Build Frontend Image ───────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/interview-agent/frontend:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/interview-agent/frontend:latest
      - ./frontend
    id: build-frontend

  # ── 3. Push Both Images ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: [push, us-central1-docker.pkg.dev/$PROJECT_ID/interview-agent/backend, --all-tags]
    waitFor: [build-backend]

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, us-central1-docker.pkg.dev/$PROJECT_ID/interview-agent/frontend, --all-tags]
    waitFor: [build-frontend]

  # ── 4. Deploy to GKE ──────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/kubectl'
    env:
      - CLOUDSDK_COMPUTE_REGION=us-central1
      - CLOUDSDK_CONTAINER_CLUSTER=interview-agent-cluster
    args:
      - apply
      - -f
      - k8s/
      - --recursive

  # ── 5. Rollout updated images ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/kubectl'
    env:
      - CLOUDSDK_COMPUTE_REGION=us-central1
      - CLOUDSDK_CONTAINER_CLUSTER=interview-agent-cluster
    args:
      - set
      - image
      - deployment/backend
      - backend=us-central1-docker.pkg.dev/$PROJECT_ID/interview-agent/backend:$COMMIT_SHA
      - -n
      - interview-agent

  - name: 'gcr.io/cloud-builders/kubectl'
    env:
      - CLOUDSDK_COMPUTE_REGION=us-central1
      - CLOUDSDK_CONTAINER_CLUSTER=interview-agent-cluster
    args:
      - set
      - image
      - deployment/frontend
      - frontend=us-central1-docker.pkg.dev/$PROJECT_ID/interview-agent/frontend:$COMMIT_SHA
      - -n
      - interview-agent

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/interview-agent/backend
  - us-central1-docker.pkg.dev/$PROJECT_ID/interview-agent/frontend

options:
  logging: CLOUD_LOGGING_ONLY
